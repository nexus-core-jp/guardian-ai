services:
  db:
    image: postgis/postgis:16-3.4
    container_name: guardian-ai-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-guardian_ai}
    volumes:
      - guardian_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-guardian_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: guardian-ai-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - guardian_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - backend

  api:
    image: ghcr.io/nexus-core-jp/guardian-ai/backend:${IMAGE_TAG:-latest}
    container_name: guardian-ai-api
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-guardian_ai}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      LINE_REDIRECT_URI: ${LINE_REDIRECT_URI}
      FCM_CREDENTIALS_PATH: /app/credentials/firebase.json
      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-com.guardianai.app}
      BOT_WEBHOOK_SECRET: ${BOT_WEBHOOK_SECRET:-}
      MITSUNE_API_KEY: ${MITSUNE_API_KEY:-}
      CORS_ORIGINS: '["https://guardian-ai.jp","https://admin.guardian-ai.jp"]'
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - backend

volumes:
  guardian_pgdata:
  guardian_redis_data:

networks:
  backend:
    driver: bridge
